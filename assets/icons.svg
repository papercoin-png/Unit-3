<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <defs>
        <!-- Hammer Icon - Primary action, forging -->
        <symbol id="icon-hammer" viewBox="0 0 24 24">
            <path d="M8 2L2 8l4 4 6-6-4-4z" fill="#C0C0C0" stroke="#8A8A8A" stroke-width="1.5"/>
            <rect x="7" y="7" width="10" height="4" fill="#8B4513" transform="rotate(45 12 9)"/>
            <circle cx="12" cy="9" r="2" fill="#D4AF37" stroke="#B8860B" stroke-width="1"/>
            <path d="M15 12L19 16 16 19 12 15 15 12z" fill="#6A6A6A" opacity="0.8"/>
        </symbol>

        <!-- Anvil Icon - Game container, foundation -->
        <symbol id="icon-anvil" viewBox="0 0 24 24">
            <path d="M4 16h16v4H4z" fill="#4A4A4A" stroke="#2A2A2A" stroke-width="1"/>
            <path d="M6 12h12v4H6z" fill="#6A6A6A" stroke="#3A3A3A" stroke-width="1"/>
            <path d="M8 8h8v4H8z" fill="#8A8A8A" stroke="#5A5A5A" stroke-width="1"/>
            <circle cx="12" cy="6" r="2" fill="#FF6B35">
                <animate attributeName="r" values="2;2.2;2" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Ingot Icon - Units/levels -->
        <symbol id="icon-ingot" viewBox="0 0 24 24">
            <path d="M5 10L12 5L19 10L12 15L5 10Z" fill="#B8860B" stroke="#D4AF37" stroke-width="1.5"/>
            <rect x="8" y="8" width="8" height="4" fill="#FFD700" opacity="0.6"/>
            <path d="M12 5L12 15M8 10L16 10" stroke="#D4AF37" stroke-width="1" opacity="0.5"/>
        </symbol>

        <!-- Spark Icon - Success, active states -->
        <symbol id="icon-spark" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="2" fill="#FF6B35">
                <animate attributeName="r" values="2;5;2" dur="0.8s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
            </circle>
            <circle cx="16" cy="8" r="1.5" fill="#FFB347">
                <animate attributeName="r" values="1.5;3;1.5" dur="0.6s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite"/>
            </circle>
            <circle cx="8" cy="16" r="1.5" fill="#FFB347">
                <animate attributeName="r" values="1.5;3;1.5" dur="0.7s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0;1" dur="0.7s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Blacksmith Icon - Profile, player -->
        <symbol id="icon-blacksmith" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" fill="#C0C0C0" stroke="#8A8A8A" stroke-width="1.5"/>
            <rect x="8" y="12" width="8" height="8" fill="#4A4A4A" rx="2"/>
            <path d="M10 14L14 18M14 14L10 18" stroke="#FF6B35" stroke-width="2"/>
            <path d="M5 20L19 20" stroke="#8A8A8A" stroke-width="2"/>
        </symbol>

        <!-- Tongs Icon - Selection, grabbing -->
        <symbol id="icon-tongs" viewBox="0 0 24 24">
            <path d="M4 8L8 4 12 8 8 12 4 8z" fill="#6A6A6A" stroke="#4A4A4A" stroke-width="1.5"/>
            <path d="M16 8L20 4 16 8zM16 8L20 12 16 8z" fill="#8A8A8A" stroke="#6A6A6A" stroke-width="1"/>
            <line x1="8" y1="12" x2="8" y2="20" stroke="#8A8A8A" stroke-width="2"/>
            <line x1="16" y1="12" x2="16" y2="20" stroke="#8A8A8A" stroke-width="2"/>
        </symbol>

        <!-- Bellows Icon - Air, progress -->
        <symbol id="icon-bellows" viewBox="0 0 24 24">
            <path d="M4 8L10 8 14 12 10 16 4 16 8 12 4 8z" fill="#8B4513" stroke="#5A2E0A" stroke-width="1.5"/>
            <circle cx="16" cy="12" r="4" fill="#C0C0C0" stroke="#8A8A8A" stroke-width="1.5"/>
            <path d="M18 10L22 8 22 16 18 14 18 10z" fill="#4A4A4A"/>
        </symbol>

        <!-- Forge Fire Icon - Active gameplay -->
        <symbol id="icon-forgefire" viewBox="0 0 24 24">
            <path d="M12 4L14 10 20 10 15 14 17 20 12 16 7 20 9 14 4 10 10 10 12 4z" fill="#FF6B35">
                <animate attributeName="opacity" values="1;0.8;1" dur="1.5s" repeatCount="indefinite"/>
            </path>
            <circle cx="12" cy="12" r="2" fill="#FFD700">
                <animate attributeName="r" values="2;3;2" dur="1s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Quench Icon - Water, completion -->
        <symbol id="icon-quench" viewBox="0 0 24 24">
            <path d="M12 4L18 12 12 20 6 12 12 4z" fill="#4A90E2" stroke="#2A6BBF" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="2" fill="#FFFFFF" opacity="0.5">
                <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Crystal Icon - Artifact, achievement -->
        <symbol id="icon-crystal" viewBox="0 0 24 24">
            <path d="M12 2L20 7 20 17 12 22 4 17 4 7 12 2z" fill="#B8860B" stroke="#D4AF37" stroke-width="2"/>
            <path d="M12 2L12 22M4 7L20 7M4 17L20 17" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
            <circle cx="12" cy="12" r="2" fill="#FFD700">
                <animate attributeName="r" values="2;3;2" dur="3s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Leaderboard Icon - Trophy, rankings -->
        <symbol id="icon-trophy" viewBox="0 0 24 24">
            <path d="M6 4H18V10C18 13.5 15 16 12 16C9 16 6 13.5 6 10V4Z" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
            <path d="M8 18H16M10 20H14" stroke="#FFD700" stroke-width="2"/>
            <circle cx="12" cy="12" r="2" fill="#FF6B35"/>
        </symbol>

        <!-- Profile Icon - User -->
        <symbol id="icon-profile" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" fill="#C0C0C0" stroke="#8A8A8A" stroke-width="1.5"/>
            <path d="M4 20C4 16 8 14 12 14C16 14 20 16 20 20" fill="none" stroke="#C0C0C0" stroke-width="2"/>
            <circle cx="12" cy="8" r="2" fill="#4A4A4A"/>
        </symbol>

        <!-- Reset Icon - Forge again -->
        <symbol id="icon-reset" viewBox="0 0 24 24">
            <path d="M12 4C8 4 4 7 4 12M20 12C20 16 16 20 12 20" stroke="#FF6B35" stroke-width="2" fill="none">
                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="2s" repeatCount="indefinite"/>
            </path>
            <path d="M4 12L2 8 6 8 4 12z" fill="#FF6B35"/>
            <path d="M20 12L22 16 18 16 20 12z" fill="#FF6B35"/>
        </symbol>

        <!-- Letter Tile Icon - For letter grid -->
        <symbol id="icon-letter" viewBox="0 0 24 24">
            <rect x="2" y="2" width="20" height="20" rx="4" fill="#C0C0C0" stroke="#8A8A8A" stroke-width="2"/>
            <rect x="4" y="4" width="16" height="16" rx="2" fill="#2A2A2A"/>
        </symbol>

        <!-- Word Chip Icon - For word list -->
        <symbol id="icon-word" viewBox="0 0 24 24">
            <rect x="2" y="6" width="20" height="12" rx="6" fill="#8B4513" stroke="#5A2E0A" stroke-width="2"/>
            <circle cx="8" cy="12" r="2" fill="#FFD700"/>
            <circle cx="16" cy="12" r="2" fill="#FFD700"/>
        </symbol>

        <!-- Success Checkmark - Completion -->
        <symbol id="icon-check" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
            <path d="M7 12L11 16 18 8" stroke="white" stroke-width="3" fill="none"/>
        </symbol>

        <!-- Failure X - Error -->
        <symbol id="icon-x" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="#F44336" stroke="#B71C1C" stroke-width="2"/>
            <line x1="8" y1="8" x2="16" y2="16" stroke="white" stroke-width="3"/>
            <line x1="16" y1="8" x2="8" y2="16" stroke="white" stroke-width="3"/>
        </symbol>

        <!-- Lock Icon - Locked units -->
        <symbol id="icon-lock" viewBox="0 0 24 24">
            <rect x="6" y="10" width="12" height="12" rx="2" fill="#4A4A4A" stroke="#2A2A2A" stroke-width="2"/>
            <path d="M8 10V6C8 4 10 2 12 2C14 2 16 4 16 6V10" fill="none" stroke="#2A2A2A" stroke-width="2"/>
            <circle cx="12" cy="16" r="2" fill="#FF6B35"/>
        </symbol>

        <!-- Unlock Icon - Unlocked units -->
        <symbol id="icon-unlock" viewBox="0 0 24 24">
            <rect x="6" y="10" width="12" height="12" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
            <path d="M8 10V6C8 4 10 2 12 2C14 2 16 4 16 6" fill="none" stroke="#2E7D32" stroke-width="2"/>
            <circle cx="12" cy="16" r="2" fill="#FFD700"/>
        </symbol>

        <!-- Back Arrow - Navigation -->
        <symbol id="icon-back" viewBox="0 0 24 24">
            <path d="M16 4L8 12 16 20" stroke="currentColor" stroke-width="2" fill="none"/>
        </symbol>

        <!-- Forward Arrow - Navigation -->
        <symbol id="icon-forward" viewBox="0 0 24 24">
            <path d="M8 4L16 12 8 20" stroke="currentColor" stroke-width="2" fill="none"/>
        </symbol>

        <!-- Settings Gear - Options -->
        <symbol id="icon-settings" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M12 4L12 2M12 22L12 20M20 12L22 12M2 12L4 12M18 6L20 4M4 20L6 18M18 18L20 20M4 4L6 6" stroke="currentColor" stroke-width="2"/>
        </symbol>

        <!-- ========== CODEX SYSTEM ICONS (NEW) ========== -->

        <!-- Codex Icon - Main entry point -->
        <symbol id="icon-codex" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="#4A2E1E" stroke="#D4AF37" stroke-width="1.5"/>
            <path d="M6 7h12M6 11h8M6 15h10" stroke="#FFD966" stroke-width="2" stroke-linecap="round"/>
            <circle cx="18" cy="18" r="2" fill="#FFD700" opacity="0.8"/>
        </symbol>

        <!-- Train Icon - Daily training -->
        <symbol id="icon-train" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" fill="#1E3B4A" stroke="#D4AF37" stroke-width="1.5"/>
            <path d="M12 6v6l4 2" stroke="#FFD966" stroke-width="2" fill="none"/>
            <circle cx="12" cy="12" r="2" fill="#FF6B35">
                <animate attributeName="r" values="2;2.5;2" dur="2s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Star Icon - Mastery indicator -->
        <symbol id="icon-star" viewBox="0 0 24 24">
            <path d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
            <animate attributeName="opacity" values="1;0.9;1" dur="3s" repeatCount="indefinite"/>
        </symbol>

        <!-- Half Star Icon - Partial mastery -->
        <symbol id="icon-star-half" viewBox="0 0 24 24">
            <path d="M12 2L15 9H22L16 14L19 21L12 16.5V2Z" fill="#FFD700" opacity="0.6" stroke="#B8860B" stroke-width="1"/>
            <path d="M12 2L9 9H2L8 14L5 21L12 16.5V2Z" fill="#4A4A4A" opacity="0.3" stroke="#8A8A8A" stroke-width="1"/>
        </symbol>

        <!-- Empty Star Icon - Not yet mastered -->
        <symbol id="icon-star-empty" viewBox="0 0 24 24">
            <path d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" fill="none" stroke="#8A8A8A" stroke-width="1.5"/>
        </symbol>

        <!-- Bookshelf Icons - Different colors for ingots -->
        <symbol id="icon-book-blue" viewBox="0 0 24 24">
            <rect x="4" y="3" width="16" height="18" rx="2" fill="#2A5F8A" stroke="#D4AF37" stroke-width="1.5"/>
            <rect x="6" y="5" width="12" height="2" fill="#FFD966" opacity="0.5"/>
            <rect x="6" y="8" width="8" height="2" fill="#FFD966" opacity="0.5"/>
        </symbol>

        <symbol id="icon-book-green" viewBox="0 0 24 24">
            <rect x="4" y="3" width="16" height="18" rx="2" fill="#2A8A5F" stroke="#D4AF37" stroke-width="1.5"/>
            <rect x="6" y="5" width="12" height="2" fill="#FFD966" opacity="0.5"/>
            <rect x="6" y="8" width="8" height="2" fill="#FFD966" opacity="0.5"/>
        </symbol>

        <symbol id="icon-book-orange" viewBox="0 0 24 24">
            <rect x="4" y="3" width="16" height="18" rx="2" fill="#D2691E" stroke="#D4AF37" stroke-width="1.5"/>
            <rect x="6" y="5" width="12" height="2" fill="#FFD966" opacity="0.5"/>
            <rect x="6" y="8" width="8" height="2" fill="#FFD966" opacity="0.5"/>
        </symbol>

        <symbol id="icon-book-brown" viewBox="0 0 24 24">
            <rect x="4" y="3" width="16" height="18" rx="2" fill="#8B4513" stroke="#D4AF37" stroke-width="1.5"/>
            <rect x="6" y="5" width="12" height="2" fill="#FFD966" opacity="0.5"/>
            <rect x="6" y="8" width="8" height="2" fill="#FFD966" opacity="0.5"/>
        </symbol>

        <!-- Completed Book Icon - Gold border for mastered ingots -->
        <symbol id="icon-book-completed" viewBox="0 0 24 24">
            <rect x="4" y="3" width="16" height="18" rx="2" fill="#4A2E1E" stroke="#FFD700" stroke-width="2.5"/>
            <rect x="6" y="5" width="12" height="2" fill="#FFD700" opacity="0.6"/>
            <rect x="6" y="8" width="8" height="2" fill="#FFD700" opacity="0.6"/>
            <circle cx="19" cy="5" r="3" fill="#FFD700">
                <animate attributeName="r" values="3;3.5;3" dur="2s" repeatCount="indefinite"/>
            </circle>
        </symbol>

        <!-- Flash Icon - For training session -->
        <symbol id="icon-flash" viewBox="0 0 24 24">
            <path d="M13 2L4 14H12L11 22L20 10H12L13 2Z" fill="#FFD966" stroke="#D4AF37" stroke-width="1.5">
                <animate attributeName="opacity" values="1;0.8;1" dur="1s" repeatCount="indefinite"/>
            </path>
        </symbol>

        <!-- Mastery Crown - For 1000+ words -->
        <symbol id="icon-crown" viewBox="0 0 24 24">
            <path d="M4 16L8 8L12 12L16 8L20 16H4Z" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
            <circle cx="8" cy="8" r="2" fill="#FF6B35"/>
            <circle cx="16" cy="8" r="2" fill="#FF6B35"/>
            <circle cx="12" cy="12" r="2" fill="#FF6B35"/>
        </symbol>

        <!-- Seedling Icon - First word -->
        <symbol id="icon-seedling" viewBox="0 0 24 24">
            <path d="M12 2C12 2 8 6 8 10C8 14 12 18 12 18C12 18 16 14 16 10C16 6 12 2 12 2Z" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.5">
                <animate attributeName="d" values="M12 2C12 2 8 6 8 10C8 14 12 18 12 18C12 18 16 14 16 10C16 6 12 2 12 2Z;M12 3C12 3 9 7 9 11C9 15 12 19 12 19C12 19 15 15 15 11C15 7 12 3 12 3Z;M12 2C12 2 8 6 8 10C8 14 12 18 12 18C12 18 16 14 16 10C16 6 12 2 12 2Z" dur="3s" repeatCount="indefinite"/>
            </path>
        </symbol>

        <!-- Scholar Icon - 100 words -->
        <symbol id="icon-scholar" viewBox="0 0 24 24">
            <path d="M12 4L3 9L12 14L21 9L12 4Z" fill="#8B4513" stroke="#D4AF37" stroke-width="1.5"/>
            <rect x="4" y="10" width="16" height="2" fill="#C0C0C0"/>
            <circle cx="12" cy="9" r="2" fill="#FFD700"/>
        </symbol>

        <!-- Living Codex Icon - 3600 words -->
        <symbol id="icon-living-codex" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" fill="#1E3B4A" stroke="#88CCFF" stroke-width="2"/>
            <circle cx="12" cy="12" r="5" fill="none" stroke="#88CCFF" stroke-width="2">
                <animate attributeName="r" values="5;6;5" dur="3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="8" cy="8" r="1" fill="#88CCFF">
                <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="16" cy="16" r="1" fill="#88CCFF">
                <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="16" cy="8" r="1" fill="#88CCFF">
                <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="8" cy="16" r="1" fill="#88CCFF">
                <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
            </circle>
        </symbol>
    </defs>
</svg>
