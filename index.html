<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellforge · Telegram Mini App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="https://i.postimg.cc/TwmzR9V2/grok-image-1772302795443.jpg" 
                 alt="Spellforge" 
                 class="loading-image">
            
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text" id="loadingText">Loading forge...</div>
            <div class="loading-tip" id="loadingTip">
                "Every word forged strengthens the crystal"
            </div>
        </div>
    </div>

    <!-- Forge Message Overlay (hidden by default) -->
    <div id="forgeMessageOverlay" class="forge-message-overlay" style="display: none;">
        <div class="forge-message-card">
            <div class="forge-message-icon" id="forgeMessageIcon">⚒️</div>
            <div class="forge-message-text" id="forgeMessageText">Hammer strikes the anvil...</div>
            <div class="forge-progress-bar">
                <div class="forge-progress-fill" id="forgeProgressFill"></div>
            </div>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <!-- header with world info and profile icon -->
        <div class="header">
            <div class="world-info" id="worldInfo">
                <span class="world-icon" id="worldIcon">⚒️</span>
                <span class="world-name" id="worldName">Grand Forge</span>
                <span class="tier-badge" id="tierBadge">Foundation</span>
            </div>
            <div class="header-right">
                <span class="progress-badge" id="progressDisplay">0/600</span>
                <button class="profile-icon" id="profileIconBtn">👤</button>
            </div>
        </div>

        <!-- unit selector section - hidden during gameplay -->
        <div class="unit-section" id="unitSection">
            <div class="unit-header">
                <span class="unit-label" id="unitLabel">INGOTS</span>
                <select class="unit-selector" id="unitSelector">
                    <option value="1">Ingot 01 · First Spark</option>
                </select>
            </div>
            <div class="unit-grid" id="unitGrid"></div>
        </div>

        <!-- word list area -->
        <div class="word-section">
            <div class="section-label">📋 WORDS TO FORGE · tap any to start</div>
            <div class="word-grid" id="wordListContainer"></div>
        </div>

        <!-- active word hint -->
        <div class="active-hint" id="activeHintArea">
            <span class="target-word" id="activeWordDisplay">—</span>
            <span class="next-letter" id="nextLetterDisplay">?</span>
        </div>

        <!-- letter grid -->
        <div class="letter-section">
            <div class="section-label">🔤 LETTER FORGE · tap in order</div>
            <div class="letter-grid" id="letterGridContainer"></div>
        </div>

        <!-- artifact progress -->
        <div class="artifact-box" id="artifactBox">
            <span class="artifact-icon">🏆</span>
            <span id="artifactText">🔒 0/20</span>
            <span>⚒️</span>
        </div>

        <!-- reset button -->
        <button class="reset-btn" id="resetButton">🔄 FORGE AGAIN</button>
        <div class="telegram-footer">Telegram Mini App · forge words to unlock</div>
    </div>

    <!-- popup overlay -->
    <div id="popupOverlay" class="popup-overlay hidden"></div>

    <script src="script.js"></script>
</body>
</html>
