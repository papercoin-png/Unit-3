<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spellforge · Telegram Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a2f3f 0%, #1e3a4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a2f3f, #0f1f29);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            max-width: 400px;
            width: 90%;
            text-align: center;
            padding: 20px;
        }

        .loading-image {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
            border: 3px solid #c9ae5b;
            animation: glowPulse 2s infinite alternate;
        }

        .loading-title {
            font-size: 36px;
            font-weight: 800;
            color: #ffdfa0;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #7a4c1d;
        }

        .loading-bar-container {
            width: 100%;
            height: 20px;
            background: #0c202b;
            border-radius: 30px;
            border: 2px solid #aa873f;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f0b345, #ffd966);
            border-radius: 30px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #ffaa33;
        }

        .loading-text {
            font-size: 18px;
            color: #ffdcaa;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .loading-tip {
            font-size: 16px;
            color: #acccdd;
            font-style: italic;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            border-left: 4px solid #c9ae5b;
        }

        .game-container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 42px;
            padding: 20px 12px 30px;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
            position: relative;
            z-index: 1;
        }

        /* Forge message overlay */
        .forge-message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            pointer-events: none;
            background: transparent;
        }

        .forge-message-card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 40px;
            text-align: center;
            border: 3px solid #c9ae5b;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 400px;
            width: 90%;
        }

        .forge-message-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: hammerStrike 0.5s ease;
        }

        @keyframes hammerStrike {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.3) rotate(-10deg); }
            50% { transform: scale(1) rotate(0deg); }
            75% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .forge-message-text {
            font-size: 28px;
            font-weight: 700;
            color: #ffdfa0;
            margin-bottom: 20px;
        }

        .forge-progress-bar {
            width: 100%;
            height: 10px;
            background: #0c202b;
            border-radius: 30px;
            border: 2px solid #aa873f;
            overflow: hidden;
            margin-top: 20px;
        }

        .forge-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f0b345, #ffd966);
            border-radius: 30px;
            animation: progressFill 2.5s linear forwards;
        }

        @keyframes progressFill {
            from { width: 0%; }
            to { width: 100%; }
        }

        /* header with world info and profile icon */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
            padding: 0 5px;
        }

        .world-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255,215,140,0.3);
        }

        .world-icon {
            font-size: 24px;
        }

        .world-name {
            font-weight: 700;
            font-size: 18px;
            color: #ffefc0;
        }

        .tier-badge {
            font-size: 12px;
            background: #f5c542;
            color: #1e2f3a;
            padding: 4px 8px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .progress-badge {
            background: rgba(255, 215, 140, 0.25);
            border: 1px solid rgba(255, 235, 150, 0.6);
            border-radius: 60px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 18px;
            color: #ffefc0;
            backdrop-filter: blur(4px);
        }

        .profile-icon {
            background: rgba(255, 215, 140, 0.25);
            border: 1px solid rgba(255, 235, 150, 0.6);
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 20px;
            color: #ffefc0;
            cursor: pointer;
            transition: all 0.1s;
            backdrop-filter: blur(4px);
        }

        .profile-icon:hover {
            background: rgba(255, 215, 140, 0.4);
        }

        /* unit selector section - hidden during gameplay */
        .unit-section {
            background: rgba(10, 25, 35, 0.7);
            border-radius: 38px;
            padding: 18px 15px;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease, max-height 0.3s ease;
            overflow: hidden;
        }

        .unit-section.hidden {
            opacity: 0;
            max-height: 0;
            padding: 0;
            margin: 0;
            pointer-events: none;
        }

        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 8px;
        }

        .unit-label {
            color: #b6d8e6;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .unit-selector {
            background: #1d3f4f;
            border: 2px solid #b8944a;
            border-radius: 40px;
            padding: 8px 16px;
            color: #ffdb8e;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }

        .unit-selector option {
            background: #1d3f4f;
            color: white;
        }

        .unit-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
            scrollbar-width: thin;
            scrollbar-color: #c9ae5b #1d3f4f;
        }

        .unit-grid::-webkit-scrollbar {
            width: 6px;
        }

        .unit-grid::-webkit-scrollbar-track {
            background: #1d3f4f;
            border-radius: 10px;
        }

        .unit-grid::-webkit-scrollbar-thumb {
            background: #c9ae5b;
            border-radius: 10px;
        }

        .unit-card {
            background: #2c4556;
            border-radius: 30px;
            padding: 12px 15px;
            min-width: 140px;
            flex: 1 0 auto;
            max-width: 160px;
            border: 2px solid #598baa;
            box-shadow: 0 4px 0 #0f1f29;
            cursor: pointer;
            transition: all 0.1s;
        }

        .unit-card.active-unit {
            background: #f5c542;
            border-color: #ffea9e;
            box-shadow: 0 0 0 3px #fce49c, 0 4px 0 #a07d2b;
        }

        .unit-card.completed {
            background: #3f6a4a;
            border-color: #a5d6a5;
            opacity: 0.8;
        }

        .unit-number {
            font-size: 14px;
            color: #acccdd;
            margin-bottom: 4px;
        }

        .unit-name {
            font-weight: 700;
            font-size: 18px;
            color: white;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .active-unit .unit-name {
            color: #1e2f3a;
        }

        .unit-progress {
            font-size: 14px;
            color: #ffdb8e;
        }

        .unit-progress-bar {
            width: 100%;
            height: 6px;
            background: #0f1f29;
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .unit-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f0b345, #ffd966);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* word list area - reduced padding */
        .word-section {
            background: rgba(10, 25, 35, 0.7);
            border-radius: 38px;
            padding: 18px 10px;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        .section-label {
            color: #b6d8e6;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .word-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
            scrollbar-width: thin;
            scrollbar-color: #c9ae5b #1d3f4f;
        }

        .word-grid::-webkit-scrollbar {
            width: 6px;
        }

        .word-grid::-webkit-scrollbar-track {
            background: #1d3f4f;
            border-radius: 10px;
        }

        .word-grid::-webkit-scrollbar-thumb {
            background: #c9ae5b;
            border-radius: 10px;
        }

        .word-chip {
            background: #2c4556;
            border-radius: 40px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 18px;
            color: #c9e9ff;
            box-shadow: 0 6px 0 #0f1f29, 0 8px 10px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
            border: 1px solid #598baa;
            user-select: none;
            cursor: pointer;
            min-width: 80px;
            text-align: center;
            position: relative;
        }

        .word-chip.completed {
            background: #3f6a4a;
            color: #d9ffd9;
            border-color: #a5d6a5;
            box-shadow: 0 4px 0 #1b3b24, 0 6px 8px rgba(0,0,0,0.3);
            opacity: 0.9;
            cursor: default;
            pointer-events: none;
            padding-right: 32px;
        }

        .word-chip.completed::after {
            content: "✓";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 0 #1b3b24;
        }

        .word-chip.active-word {
            background: #f5c542;
            color: #1e2f3a;
            border-color: #ffea9e;
            box-shadow: 0 0 0 3px #fce49c, 0 6px 0 #a07d2b;
            transform: scale(1.02);
            font-weight: 800;
        }

        /* active word hint */
        .active-hint {
            background: #244454;
            border-radius: 30px;
            padding: 15px 18px;
            margin: 18px 0 10px;
            text-align: center;
            border-left: 8px solid #f5c542;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .target-word {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #ffea9a;
        }

        .next-letter {
            background: #f5c542;
            color: #1f2e3a;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 24px;
            min-width: 70px;
            text-align: center;
            box-shadow: 0 4px 0 #946f2c;
        }

        /* letter bank - reduced padding */
        .letter-section {
            background: rgba(10, 25, 35, 0.7);
            border-radius: 38px;
            padding: 18px 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .letter-tile {
            width: 58px;
            height: 58px;
            background: linear-gradient(145deg, #ffcf8a, #febf6e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 30px;
            color: #1f3b4a;
            box-shadow: 0 7px 0 #b2752e, 0 8px 12px rgba(0, 0, 0, 0.4);
            transition: all 0.08s linear;
            cursor: pointer;
            border: 2px solid #ffdcaa;
            text-transform: uppercase;
            user-select: none;
        }

        .letter-tile:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b2752e, 0 8px 12px rgba(0,0,0,0.4);
        }

        .letter-tile.used {
            background: #3a4d5e;
            box-shadow: 0 4px 0 #1d2c36, 0 6px 8px rgba(0,0,0,0.3);
            border-color: #5b7485;
            color: #a1b9cc;
            cursor: not-allowed;
            transform: translateY(3px);
            pointer-events: none;
            opacity: 0.5;
        }

        /* reset button */
        .reset-btn {
            background: #334e62;
            border: none;
            border-radius: 60px;
            padding: 18px 25px;
            font-weight: 700;
            font-size: 20px;
            color: #ffefcf;
            box-shadow: 0 8px 0 #1c2f3b, 0 6px 15px black;
            cursor: pointer;
            width: 100%;
            transition: 0.08s;
            border: 1px solid #63879e;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #1c2f3b, 0 6px 10px black;
        }

        /* popup overlay base */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.3s;
            padding: 16px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        /* word card - with smaller collect button */
        .word-card {
            max-width: 380px;
            width: 100%;
            background: linear-gradient(165deg, #fff8e7, #ffffff);
            border-radius: 58px;
            padding: 30px 20px;
            box-shadow: 0 30px 50px #00000080, 0 0 0 6px #fad87c;
            text-align: center;
            animation: pop 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.3);
            border: 3px solid #ffcd7e;
            margin: auto;
        }

        @keyframes pop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .word-emoji {
            font-size: 110px;
            line-height: 1.2;
            margin: 5px 0;
        }

        .word-title {
            font-size: 58px;
            font-weight: 900;
            color: #1f4a5c;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 3px 5px 0 #ffcd7e;
            margin: 5px 0;
            word-break: break-word;
        }

        .word-sentence {
            font-size: 22px;
            background: #ebcba0;
            padding: 20px;
            border-radius: 40px;
            color: #1f3a47;
            font-weight: 500;
            margin: 20px 0;
            border: 2px dashed #a5723b;
            word-break: break-word;
        }

        /* 25% smaller collect button */
        .collect-btn {
            background: #f5b342;
            border: none;
            border-radius: 50px;
            padding: 14px;
            font-weight: 700;
            font-size: 22px;
            color: #1f3826;
            box-shadow: 0 5px 0 #9e691f;
            cursor: pointer;
            width: 80%;
            margin: 0 auto;
            display: block;
            border: 2px solid #ffe39b;
            transition: 0.08s;
        }

        .collect-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9e691f;
        }

        /* ingot complete popup */
        .ingot-card {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(165deg, #4a2e1e, #6b4a2e);
            border-radius: 70px;
            padding: 40px 25px 45px;
            box-shadow: 0 30px 50px #000000cc, 0 0 0 8px #ffd966;
            text-align: center;
            animation: glowPulse 2s infinite alternate;
            border: 3px solid #ffb347;
            margin: auto;
        }

        @keyframes glowPulse {
            from { box-shadow: 0 30px 50px #000000cc, 0 0 0 8px #ffd966; }
            to { box-shadow: 0 30px 60px #000000, 0 0 0 12px #ffaa33; }
        }

        .ingot-emoji {
            font-size: 90px;
            line-height: 1.2;
            margin: 15px 0;
            filter: drop-shadow(8px 15px 0 #3f2b16);
        }

        .ingot-title {
            font-size: 48px;
            font-weight: 900;
            color: #ffecb3;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 5px 5px 0 #7a4c1d;
            margin: 5px 0;
            line-height: 1.2;
        }

        .ingot-sub {
            font-size: 28px;
            color: #ffe39a;
            background: #3d2b17;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 20px 0 15px;
            border: 2px solid #e5a449;
        }

        .ingot-stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .ingot-stat {
            text-align: center;
        }

        .ingot-stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #ffdb8e;
        }

        .ingot-stat-label {
            font-size: 14px;
            color: #acccdd;
        }

        .ingot-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .ingot-btn {
            flex: 1;
            background: #f0b345;
            border: none;
            border-radius: 40px;
            padding: 16px 10px;
            font-weight: 700;
            font-size: 20px;
            color: #1d332b;
            box-shadow: 0 5px 0 #9e691f;
            cursor: pointer;
            border: 2px solid #ffe694;
            transition: 0.08s;
        }

        .ingot-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9e691f;
        }

        .ingot-btn.secondary {
            background: #557a8b;
            box-shadow: 0 5px 0 #2e4a57;
            color: white;
        }

        /* failure popup */
        .failure-card {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(165deg, #4a1e1e, #6b2e2e);
            border-radius: 70px;
            padding: 40px 25px 45px;
            box-shadow: 0 30px 50px #000000cc, 0 0 0 8px #ff6666;
            text-align: center;
            animation: shake 0.3s;
            border: 3px solid #ff4747;
            margin: auto;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .failure-emoji {
            font-size: 90px;
            line-height: 1.2;
            margin: 15px 0;
        }

        .failure-title {
            font-size: 48px;
            font-weight: 900;
            color: #ffb3b3;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 5px 5px 0 #7a1d1d;
            margin: 5px 0;
        }

        .failure-sub {
            font-size: 24px;
            color: #ffb3b3;
            margin: 20px 0;
        }

        .failure-buttons {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .failure-btn {
            flex: 1;
            background: #f0b345;
            border: none;
            border-radius: 40px;
            padding: 16px 10px;
            font-weight: 700;
            font-size: 20px;
            color: #1d332b;
            box-shadow: 0 5px 0 #9e691f;
            cursor: pointer;
            border: 2px solid #ffe694;
            transition: 0.08s;
        }

        .failure-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9e691f;
        }

        .failure-btn.secondary {
            background: #557a8b;
            box-shadow: 0 5px 0 #2e4a57;
            color: white;
        }

        /* next ingot preview popup - with grace display */
        .preview-card {
            max-width: 440px;
            width: 100%;
            background: linear-gradient(165deg, #1e3b4a, #16323f);
            border-radius: 60px;
            padding: 30px 25px;
            box-shadow: 0 30px 50px #000000cc, 0 0 0 8px #c9ae5b;
            text-align: center;
            border: 3px solid #dbb45c;
            margin: auto;
        }

        .preview-title {
            font-size: 32px;
            font-weight: 800;
            color: #ffdfa0;
            margin-bottom: 15px;
        }

        .preview-ingot {
            font-size: 28px;
            font-weight: 700;
            color: #ffdb8e;
            margin-bottom: 20px;
        }

        .chance-container {

<body>
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <img src="https://i.postimg.cc/TwmzR9V2/grok-image-1772302795443.jpg"

                 class="loading-image">

            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text" id="loadingText">Loading forge...</div>
            <div class="loading-tip" id="loadingTip">
                "Every word forged strengthens the crystal"
            </div>
        </div>
    </div>

    <!-- Forge Message Overlay (hidden by default) -->
    <div id="forgeMessageOverlay" class="forge-message-overlay" style="display: none;">
        <div class="forge-message-card">
            <div class="forge-message-icon" id="forgeMessageIcon">⚒️</div>
            <div class="forge-message-text" id="forgeMessageText">Hammer strikes the anvil...</div>
            <div class="forge-progress-bar">
                <div class="forge-progress-fill" id="forgeProgressFill"></div>
            </div>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <!-- header with world info and profile icon -->
        <div class="header">
            <div class="world-info" id="worldInfo">
                <span class="world-icon" id="worldIcon">⚒️</span>
                <span class="world-name" id="worldName">Grand Forge</span>
                <span class="tier-badge" id="tierBadge">Foundation</span>
            </div>
            <div class="header-right">
                <span class="progress-badge" id="progressDisplay">0/600</span>
                <button class="profile-icon" id="profileIconBtn">👤</button>
            </div>
        </div>

        <!-- unit selector section - hidden during gameplay -->
        <div class="unit-section" id="unitSection">
            <div class="unit-header">
                <span class="unit-label" id="unitLabel">INGOTS</span>
                <select class="unit-selector" id="unitSelector">
                    <option value="1">Ingot 01 · First Spark</option>
                </select>
            </div>
            <div class="unit-grid" id="unitGrid"></div>
        </div>

        <!-- word list area - reduced padding -->
        <div class="word-section">
            <div class="section-label">📋 WORDS TO FORGE · tap any to start</div>
            <div class="word-grid" id="wordListContainer"></div>
        </div>

        </div>

        <div class="telegram-footer">Telegram Mini App · forge words to unlock</div>
    </div>

    <!-- popup overlay -->
    <div id="popupOverlay" class="popup-overlay hidden"></div>

    <script>
        (function() {
            // ---------- TELEGRAM INTEGRATION ----------
            let tg = window.Telegram?.WebApp;
            if (tg) {
                tg.expand();
                tg.enableClosingConfirmation?.();
                tg.setHeaderColor?.('#1a2f3f');
            }

            // ---------- LOADING SCREEN ----------
            const loadingTips = [
                '"Every word forged strengthens the crystal"',
                '"The forge remembers every letter"',
                '"Speed and accuracy forge the strongest words"',
                '"Ancient runes glow brighter with each completion"',
                '"The Word Crystal chooses its master wisely"',
                '"Patience tempers the strongest steel"',
                '"Even legends started as apprentices"',
                '"The guild watches your progress"',
                '"Each ingot tells a story"',
                '"Forgemasters never rush the craft"'
            ];

            document.getElementById('loadingTip').innerText = 
                loadingTips[Math.floor(Math.random() * loadingTips.length)];

            let loadingComplete = false;
            let minimumTimePassed = false;

            function simulateLoading() {
                const loadingScreen = document.getElementById('loadingScreen');
                const loadingBar = document.getElementById('loadingBar');
                const loadingText = document.getElementById('loadingText');
                const loadingTip = document.getElementById('loadingTip');
                
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    
                    if (progress >= 100) {
                        progress = 100;
                        loadingBar.style.width = progress + '%';
                        loadingText.innerText = 'Forge ready!';
                        
                        loadingComplete = true;
                        if (minimumTimePassed) {
                            setTimeout(() => {
                                loadingScreen.classList.add('fade-out');
                                setTimeout(() => {
                                    loadingScreen.style.display = 'none';
                                }, 500);
                            }, 300);
                        }
                        clearInterval(interval);
                    } else {
                        loadingBar.style.width = progress + '%';
                        loadingText.innerText = `Loading forge... ${Math.floor(progress)}%`;
                        
                        if (Math.random() > 0.7) {
                            const randomTip = loadingTips[Math.floor(Math.random() * loadingTips.length)];
                            loadingTip.innerText = randomTip;
                        }
                    }
                }, 200);
            }

            setTimeout(() => {
                minimumTimePassed = true;
                if (loadingComplete) {
                    document.getElementById('loadingScreen').classList.add('fade-out');
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                    }, 500);
                }
            }, 2000);

            window.addEventListener('load', simulateLoading);

            // ---------- FORGE MESSAGE FUNCTIONS ----------
            const forgeMessageOverlay = document.getElementById('forgeMessageOverlay');
            const forgeMessageIcon = document.getElementById('forgeMessageIcon');
            const forgeMessageText = document.getElementById('forgeMessageText');
            const forgeProgressFill = document.getElementById('forgeProgressFill');

            function showForgeMessage(text, icon = '⚒️', duration = 2500) {
                forgeMessageIcon.innerText = icon;
                forgeMessageText.innerText = text;
                forgeMessageOverlay.style.display = 'flex';
                
                // Reset and restart progress animation
                forgeProgressFill.style.animation = 'none';
                forgeProgressFill.offsetHeight; // Trigger reflow
                forgeProgressFill.style.animation = 'progressFill ' + (duration/1000) + 's linear forwards';
            }

            function updateForgeMessage(text, icon = '⚒️') {
                forgeMessageIcon.innerText = icon;
                forgeMessageText.innerText = text;
            }

            function hideForgeMessage() {
                forgeMessageOverlay.style.display = 'none';
            }

            // ---------- MASTER WORD BANK · 3,600 WORDS ----------
            const MASTER_WORDS = {
                // WORLD 1: GRAND FORGE (600 words)
                world1: {
                    name: "Grand Forge",
                    icon: "⚒️",
                    unitType: "Ingot",
                    units: {
                        1: { // Ingot 01: First Spark
                            name: "First Spark",
                            words: [
                                { word: "alien", emoji: "👽", sentence: "The friendly alien played guitar with astronauts." },
                                { word: "among", emoji: "🕵️", sentence: "A red mushroom stood among the green ferns." },

                const difficulty = ingotDifficulty[ingotId] || { baseChance: 50, tier: "Unknown" };

                const finalChance = Math.min(difficulty.baseChance + grace, 99);

                    base: difficulty.baseChance,
                    grace: grace,
                    tier: difficulty.tier,

            function generateInitialLetters() {
                const words = getCurrentUnitWords();
                if (!words || words.length === 0) return [];
                
                const letterCounts = {};
                words.forEach(entry => {
                    entry.word.split('').forEach(letter => {
                        letterCounts[letter] = (letterCounts[letter] || 0) + 1;
                    });
                });
                
                const letterBank = [];
                Object.keys(letterCounts).forEach(letter => {
                    for (let i = 0; i < letterCounts[letter]; i++) {
                        letterBank.push(letter);
                    }
                });
                
                for (let i = letterBank.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [letterBank[i], letterBank[j]] = [letterBank[j], letterBank[i]];
                }
                
                return letterBank;
            }

                const accuracyScore = Math.round(accuracy * 2);
                const speedScore = timeSeconds > 0 ? Math.round(100000 / timeSeconds) : 2000;
                const perfectionBonus = (accuracy === 100 && totalTapsCount === correctTapsCount) ? 100 : 0;
                return Math.min(accuracyScore + speedScore + perfectionBonus, 1600);
            }

            function getRatingFromScore(score) {
                if (score >= 1400) return { title: "LEGEND", emoji: "🔥" };
                if (score >= 1200) return { title: "MASTER", emoji: "👑" };
                if (score >= 1000) return { title: "EXPERT", emoji: "⚡" };
                if (score >= 800) return { title: "ADVANCED", emoji: "🛡️" };
                if (score >= 600) return { title: "INTERMEDIATE", emoji: "📘" };
                return { title: "NOVICE", emoji: "🌱" };
            }

            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            function saveProgress() {
                const saveData = {
                    version: "1.0",
                    lastUpdated: new Date().toISOString(),
                    currentWorld: currentWorld,
                    currentUnit: currentUnit,
                    completedWords: completedWords,
                    playerPerformance: playerPerformance,
                    worlds: worlds,
                    ingotGrace: ingotGrace
                };
                try {
                    localStorage.setItem('spellforge_save', JSON.stringify(saveData));
                } catch (e) {}
            }

            function loadProgress() {
                try {
                    const saved = localStorage.getItem('spellforge_save');
                    if (saved) {
                        const saveData = JSON.parse(saved);
                        if (saveData.worlds) {
                            Object.keys(saveData.worlds).forEach(key => {
                                if (worlds[key]) {
                                    const savedWorld = saveData.worlds[key];
                                    worlds[key].unlocked = savedWorld.unlocked;
                                    worlds[key].completed = savedWorld.completed;
                                    savedWorld.units.forEach(savedUnit => {
                                        const unit = worlds[key].units.find(u => u.id === savedUnit.id);
                                        if (unit) {
                                            unit.wordsCompleted = savedUnit.wordsCompleted;
                                            unit.unlocked = savedUnit.unlocked;
                                        }
                                    });
                                }
                            });
                        }
                        if (saveData.ingotGrace) {
                            Object.keys(saveData.ingotGrace).forEach(key => {
                                ingotGrace[key] = saveData.ingotGrace[key];
                            });
                        }
                        if (saveData.currentWorld) currentWorld = saveData.currentWorld;
                        if (saveData.currentUnit) currentUnit = saveData.currentUnit;
                        if (saveData.completedWords) completedWords = saveData.completedWords;
                        if (saveData.playerPerformance) {
                            playerPerformance = { ...playerPerformance, ...saveData.playerPerformance };
                        }
                    }
                } catch (e) {}
            }

            // ---------- GAME MECHANICS ----------
            function handleWordCompletion(wordIndex) {
                if (!completedWords.includes(wordIndex)) {
                    completedWords.push(wordIndex);
                    const unit = worlds[currentWorld].units.find(u => u.id === currentUnit);
                    if (unit) unit.wordsCompleted = completedWords.length;
                    
                    const words = getCurrentUnitWords();
                    if (words && words.length > 0 && words[wordIndex]) {
                        showWordCard(words[wordIndex]);
                    }
                }

                activeWordIndex = null;
                currentPosition = 0;
                tempUsedLetters = [];
                
                if (activeWordIndex === null) {
                    setUnitSectionVisibility(true);
                    updateHeaderForSelection();
                }
                
                renderAll();
                updateWorldDisplay();
                
                const unit = worlds[currentWorld].units.find(u => u.id === currentUnit);
                if (unit && unit.wordsCompleted === 20) {
                    const accuracy = totalTaps === 0 ? 100 : Math.round((correctTaps / totalTaps) * 100);
                    const chance = calculateSuccessChance(currentUnit);
                    const roll = Math.random() * 100;
                    const success = roll <= chance.final;
                    
                    tg?.HapticFeedback?.impactOccurred?.('heavy');
                    showForgeMessage('Hammer strikes the anvil...', '⚒️', 2500);
                    document.body.style.transition = 'background-color 0.5s';
                    document.body.style.backgroundColor = success ? '#4ade80' : '#f87171';
                    
                    setTimeout(() => {
                        updateForgeMessage(success ? 'The metal holds...' : 'A crack forms...', success ? '✨' : '💔');
                    }, 1000);
                    
                    setTimeout(() => {
                        document.body.style.backgroundColor = '';
                        hideForgeMessage();
                        
                        if (success) {
                            playerPerformance.currentStreak++;
                            playerPerformance.bestStreak = Math.max(playerPerformance.bestStreak, playerPerformance.currentStreak);
                            playerPerformance.lastAccuracy = accuracy;
                            playerPerformance.lastAttemptFailed = false;
                            playerPerformance.lastPlayedDate = new Date().toISOString();
                            playerPerformance.worldProgress[currentWorld].completed++;
                            playerPerformance.totalRiskBonus += calculateRiskBonus(chance.base, chance.final, true);
                            playerPerformance.ingotHistory.push({
                                id: currentUnit,
                                success: true,
                                accuracy: accuracy,
                                time: gameStartTime ? Math.floor((Date.now() - gameStartTime) / 1000) : 0,
                                sfr: calculateSFR(gameStartTime ? Math.floor((Date.now() - gameStartTime) / 1000) : 0, accuracy, totalTaps, correctTaps),
                                date: new Date().toISOString()
                            });
                            onSuccess(currentUnit);
                            showIngotCompletePopup();
                            const nextUnit = worlds[currentWorld].units.find(u => u.id === currentUnit + 1);
                            if (nextUnit) nextUnit.unlocked = true;
                            saveProgress();
                        } else {
                            onFailure(currentUnit);
                            playerPerformance.lastAttemptFailed = true;
                            playerPerformance.lastPlayedDate = new Date().toISOString();
                            playerPerformance.worldProgress[currentWorld].failed++;
                            playerPerformance.ingotHistory.push({
                                id: currentUnit,
                                success: false,
                                accuracy: accuracy,
                                time: gameStartTime ? Math.floor((Date.now() - gameStartTime) / 1000) : 0,
                                sfr: 0,
                                date: new Date().toISOString()
                            });
                            showFailurePopup();
                        }
                    }, 2500);
                }
            }

            function handleLetterTap(letter, indexInGrid) {
                if (gameCompleted) return;
                totalTaps++;
                
                if (activeWordIndex === null) {
                    tg?.HapticFeedback?.notificationOccurred?.('warning');
                    return;
                }
                
                if (completedWords.includes(activeWordIndex)) {
                    activeWordIndex = null;
                    currentPosition = 0;
                    renderAll();
                    return;
                }

                const words = getCurrentUnitWords();
                if (!words || words.length === 0) return;
                
                const targetWord = words[activeWordIndex].word;
                const neededLetter = targetWord[currentPosition];

                if (letter.toLowerCase() !== neededLetter.toLowerCase()) {
                    tg?.HapticFeedback?.notificationOccurred?.('error');
                    renderAll();
                    return;
                }

                correctTaps++;
                const removed = currentLetters.splice(indexInGrid, 1)[0];
                tempUsedLetters.push(removed);
                currentPosition++;
                
                tg?.HapticFeedback?.impactOccurred?.('light');
                renderAll();

                if (currentPosition === targetWord.length) {
                    handleWordCompletion(activeWordIndex);
                }
            }

            // ---------- RENDER UI ----------
            function renderAll() {
                const words = getCurrentUnitWords();
                
                const wordContainer = document.getElementById('wordListContainer');
                if (wordContainer) {
                    wordContainer.innerHTML = '';
                    if (words && words.length > 0) {
                        words.forEach((w, idx) => {
                            const chip = document.createElement('div');
                            chip.className = 'word-chip';
                            if (completedWords.includes(idx)) chip.classList.add('completed');
                            else if (activeWordIndex === idx) chip.classList.add('active-word');
                            chip.innerText = w.word;
                            chip.addEventListener('click', (e) => {
                                e.stopPropagation();
                                if (completedWords.includes(idx) || gameCompleted) return;
                                if (activeWordIndex !== null && activeWordIndex !== idx) returnTempLetters();
                                activeWordIndex = idx;
                                currentPosition = 0;
                                setUnitSectionVisibility(false);
                                updateHeaderForGameplay();
                                renderAll();
                                tg?.HapticFeedback?.selectionChanged?.();
                            });
                            wordContainer.appendChild(chip);
                        });
                    } else {
                        const placeholder = document.createElement('div');
                        placeholder.className = 'word-chip';
                        placeholder.innerText = "Coming Soon";
                        wordContainer.appendChild(placeholder);
                    }
                }

                if (activeWordIndex !== null && !completedWords.includes(activeWordIndex) && !gameCompleted && words && words.length > 0) {
                    const w = words[activeWordIndex].word;
                    const progressWord = w.split('').map((l, i) => i < currentPosition ? l.toUpperCase() : '_').join(' ');
                    document.getElementById('activeWordDisplay').innerText = progressWord || '—';
                    document.getElementById('nextLetterDisplay').innerText = (currentPosition < w.length) ? w[currentPosition].toUpperCase() : '✅';
                } else {
                    document.getElementById('activeWordDisplay').innerText = '—';
                    document.getElementById('nextLetterDisplay').innerText = '?';
                }

                const gridContainer = document.getElementById('letterGridContainer');
                gridContainer.innerHTML = '';
                if (currentLetters.length > 0) {
                    currentLetters.forEach((letter, idx) => {
                        const tile = document.createElement('div');
                        tile.className = 'letter-tile';
                        tile.innerText = letter.toUpperCase();
                        tile.addEventListener('click', (e) => {
                            e.preventDefault();
                            handleLetterTap(letter, idx);
                        });
                        gridContainer.appendChild(tile);
                    });
                }

                const artifactEl = document.getElementById('artifactText');
                const unit = worlds[currentWorld].units.find(u => u.id === currentUnit);
                if (unit) {
                    artifactEl.innerText = unit.wordsCompleted === 20 ? '🌟 UNIT COMPLETE! 🌟' : `🔒 ${unit.wordsCompleted}/20`;
                }
            }

            // ---------- RESET ----------
            function confirmReset() {
                if (tg) {
                    tg.showConfirm('Restart this ingot? All progress will be lost.', (ok) => {
                        if (ok) {
                            resetForNewUnit();
                            tg.HapticFeedback?.impactOccurred?.('heavy');
                        }
                    });
                } else {
                    if (confirm('Restart this ingot?')) resetForNewUnit();
                }
            }

            // ---------- INITIALIZATION ----------
            document.getElementById('resetButton').addEventListener('click', confirmReset);
            document.getElementById('profileIconBtn').addEventListener('click', () => showProfilePopup(false));
            
            document.getElementById('unitSelector').addEventListener('change', (e) => {
                currentUnit = parseInt(e.target.value);
                resetForNewUnit();
                updateWorldDisplay();
                saveProgress();
            });

            document.addEventListener('click', (e) => {
                if (activeWordIndex !== null && 
                    !e.target.closest('.word-chip') && 
                    !e.target.closest('.letter-tile')) {
                    returnTempLetters();
                    activeWordIndex = null;
                    currentPosition = 0;
                    setUnitSectionVisibility(true);
                    updateHeaderForSelection();
                    renderAll();
                }
            });

            loadProfile();
            loadProgress();
            startAutoSave();
            updateWorldDisplay();
            resetForNewUnit();

            if (tg) {
                tg.onEvent('backButtonClicked', () => {
                    saveProgress();
                    setTimeout(() => tg.close(), 100);
                });
                tg.BackButton?.show();
                tg.ready();
            }
        })();
    </script>
</body>
</html>
